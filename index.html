<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Task Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-blue-700 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">Student Task Tracker</h1>
        </div>
    </nav>

    <!-- Hero Section -->
   <section class="text-center py-16 bg-white shadow-sm"></section>
        <h2 class="text-4xl font-bold text-gray-800">Manage Your Daily Tasks</h2>
        <p class="text-gray-600 mt-3">Stay organized and never miss deadlines.</p>
    </section>

    <!-- Task Form -->
    <section class="container mx-auto p-5">
        <div class="bg-white p-6 rounded-lg shadow-md">
            <form id="taskForm" class="grid md:grid-cols-3 gap-4">
                <input
                    type="text"
                    id="taskInput"
                    placeholder="Enter task"
                    class="border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                >

                <input
                    type="date"
                    id="dateInput"
                    class="border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                >

                <button
                    type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white rounded-lg p-3 transition"
                >
                    Add Task
                </button>
            </form>
        </div>
    </section>

    <!-- Task Display Area -->
    <section class="container mx-auto p-5">
        <div id="taskList" class="grid gap-4 md:grid-cols-2 lg:grid-cols-3"></div>
    </section>

    <script src="script.js"></script>
</body>
</html>
